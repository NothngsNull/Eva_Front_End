<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio de sesión - Usuario</title>
    <link rel="stylesheet" href="estilosC.css">
</head>
<body>

    <div class="contenedor">
        <header>
            <img src="logo.png" alt="Logo SportClub" class="logo">
        </header>

        <main>
            <h1>Inicio de sesión</h1>

            <form id="formUser">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="Ingresa tu correo" required>

                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Ingresa tu contraseña" required>

                <p id="error-msg" style="color: #0056b3; font-weight: bold; margin-bottom: 15px; display: none; text-align: center; font-size: 14px;">
                    Credenciales incorrectas. Intente nuevamente.
                </p>

                <button type="submit">Ingresar</button>
            </form>

            <div class="enlaces">
                <a href="recoverC.html">Recuperar clave</a>
                <span>|</span>
                <a href="registerC.html">Registrarse</a>
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
