<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario - SportClub</title>
    <link rel="stylesheet" href="estilosC.css">
</head>
<body>

    <div class="contenedor contenedor-registro">
        <header>
            <img src="logo.png" alt="Logo SportClub" class="logo">
        </header>

        <main>
            <h1>Registro de usuario</h1>

            <form id="formRegister" novalidate>
                <div class="form-columnas">

                    <!-- COLUMNA IZQUIERDA -->
                    <div class="columna columna-izq">

                        <div class="campo-grupo">
                            <label for="nombre">Nombre *</label>
                            <input type="text" id="nombre" placeholder="Tu nombre completo" autocomplete="name">
                            <span class="campo-error" id="error-nombre"></span>
                        </div>

                        <div class="campo-grupo">
                            <label for="edad">Edad</label>
                            <input type="number" id="edad" min="1" max="120" placeholder="Tu edad">
                            <span class="campo-error" id="error-edad"></span>
                        </div>

                        <hr class="separador-horizontal">

                        <div class="campo-grupo">
                            <label for="deporte">¿Practica deporte?</label>
                            <select id="deporte">
                                <option value="">Seleccione una opción</option>
                                <option value="si">Sí</option>
                                <option value="no">No</option>
                            </select>
                            <span class="campo-error" id="error-deporte"></span>
                        </div>

                        <div class="campo-grupo">
                            <label for="objetivo">Objetivo personal</label>
                            <input type="text" id="objetivo" placeholder="Ej. Bajar de peso">
                            <span class="campo-error" id="error-objetivo"></span>
                        </div>

                        <div class="campo-grupo">
                            <label for="nivel">Nivel</label>
                            <select id="nivel">
                                <option value="">Seleccione nivel</option>
                                <option value="principiante">Principiante</option>
                                <option value="intermedio">Intermedio</option>
                                <option value="avanzado">Avanzado</option>
                            </select>
                            <span class="campo-error" id="error-nivel"></span>
                        </div>

                    </div>

                    <!-- COLUMNA DERECHA -->
                    <div class="columna columna-der">

                        <div class="campo-grupo">
                            <label for="email">Correo electrónico *</label>
                            <input type="email" id="email" placeholder="ejemplo@mail.com" autocomplete="email">
                            <span class="campo-error" id="error-email"></span>
                        </div>

                        <div class="campo-grupo">
                            <label for="password">Contraseña *</label>
                            <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
                            <span class="campo-error" id="error-password"></span>
                        </div>

                        <div class="campo-grupo">
                            <label for="password_confirm">Repetir contraseña *</label>
                            <input type="password" id="password_confirm" placeholder="Repite tu contraseña" autocomplete="new-password">
                            <span class="campo-error" id="error-password-confirm"></span>
                        </div>

                        <div class="campo-grupo">
                            <label for="info_adicional">Información adicional (opcional)</label>
                            <textarea id="info_adicional" placeholder="Algún detalle extra que quieras contarnos..."></textarea>
                        </div>

                    </div>
                </div>

                <!-- Error general de API -->
                <p id="error-msg" class="campo-error campo-error-general"></p>

                <button type="submit">Registrarse</button>
            </form>

            <div class="enlaces">
                <a href="login.html">Volver al inicio de sesión</a>
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
